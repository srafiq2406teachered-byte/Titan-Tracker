<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Titan Tracker</title>
    
    <meta name="theme-color" content="#070707" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Titan+">

    <style>
      body { 
        background-color: #070707; 
        margin: 0; 
        padding: 0; 
        color: white; 
        /* Prevents "pull-to-refresh" on mobile which can break the app feel */
        overscroll-behavior-y: contain; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Titan SW Registered'))
            .catch(err => console.error('Titan SW Failed', err));
        });
      }
    </script>
  </body>
</html>
