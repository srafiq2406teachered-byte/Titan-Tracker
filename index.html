<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Titan Tracker</title>
    <meta name="description" content="Mass Protocol - 93kg Performance OS" />
    <meta name="theme-color" content="#070707" />

    <link rel="manifest" href="/manifest.json" />
    
    <link rel="icon" type="image/png" href="/titan-icon-192.png" />
    <link rel="apple-touch-icon" href="/titan-icon-192.png" />
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Titan">

    <style>
      body {
        background-color: #070707;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        /* Fix for mobile momentum scrolling */
        -webkit-overflow-scrolling: touch;
      }
      /* Prevent text selection during heavy lifting sessions */
      * {
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      input {
        user-select: text !important; /* Allow typing in weight fields */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
