<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Titan Tracker</title>
    <meta name="theme-color" content="#070707" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              titanBlack: '#070707',
              titanOrange: '#EA580C',
              titanCyan: '#06B6D4',
            }
          }
        }
      }
    </script>

    <style type="text/css">
      :root {
        color-scheme: dark;
      }
      body {
        background-color: #070707 !important;
        color: #ffffff !important;
        margin: 0;
        padding: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Fix for the white input boxes in your screenshot */
      input {
        background-color: #000000 !important;
        color: #EA580C !important;
        border: 1px solid #27272a !important;
        border-radius: 12px;
      }
      /* Prevent gray highlight on mobile taps */
      * { -webkit-tap-highlight-color: transparent; }
    </style>

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/titan-icon-192.png" />
    <link rel="apple-touch-icon" href="/titan-icon-192.png" />
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
